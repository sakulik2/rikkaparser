<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatParse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <!-- KaTeX：用于渲染 LaTeX 数学公式（$...$  行内，$$...$$ 块级）-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --bg-secondary: #ffffff;
            --bg-hover: #f0f0f5;
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --accent: #5b5fc7;
            --accent-light: #7c7fff;
            --user-bg: #e8eaff;
            --assistant-bg: #ffffff;
            --system-bg: #fef9ef;
            --border: #e5e7eb;
            --code-bg: #f3f4f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Upload screen */
        .upload-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .upload-inner {
            max-width: 420px;
        }

        .upload-inner h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-inner p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 24px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: var(--accent);
            background: #f0f0ff;
        }

        .upload-area .icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        .upload-area .label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .upload-area input {
            display: none;
        }

        .progress-bar {
            display: none;
            margin-top: 16px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        .status-text {
            display: none;
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* Sidebar */
        .app-container {
            display: none;
            width: 100%;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .conv-count {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .search-wrap {
            margin: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .search-box {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
            width: 100%;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-mode-toggle {
            display: flex;
            gap: 0;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
            font-size: 0.75rem;
        }

        .search-mode-btn {
            flex: 1;
            padding: 4px 0;
            text-align: center;
            cursor: pointer;
            background: var(--bg);
            color: var(--text-muted);
            border: none;
            transition: all 0.15s;
        }

        .search-mode-btn.active {
            background: var(--accent);
            color: #fff;
        }

        .search-match-preview {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 2px;
            line-height: 1.3;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .search-match-preview mark {
            background: #fde68a;
            color: #1a1a1a;
            border-radius: 2px;
            padding: 0 1px;
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }

        .conv-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 2px;
        }

        .conv-item:hover {
            background: var(--bg-hover);
        }

        .conv-item.active {
            background: var(--accent);
            color: #fff;
        }

        .conv-title {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        .conv-item.active .conv-meta {
            color: rgba(255, 255, 255, 0.7);
        }

        .assistant-badge {
            font-size: 0.65rem;
            background: rgba(91, 95, 199, 0.15);
            color: var(--accent);
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 4px;
        }

        .conv-item.active .assistant-badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Gemini 来源标记：蓝绿配色区分 RikkaHub 的紫色 */
        .gemini-badge {
            background: rgba(26, 115, 232, 0.12);
            color: #1a73e8;
        }

        .conv-item.active .gemini-badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Open-WebUI 来源徽章：绿色 */
        .owui-badge {
            background: rgba(16, 163, 127, 0.12);
            color: #10a37f;
        }

        .conv-item.active .owui-badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Chatbox 来源徽章：橙色 */
        .chatbox-badge {
            background: rgba(255, 152, 0, 0.12);
            color: #f57c00;
        }

        .conv-item.active .chatbox-badge {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .menu-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 1.2rem;
            padding: 5px 9px;
            border-radius: 6px;
            cursor: pointer;
        }

        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .welcome-inner h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .welcome-inner p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .welcome-inner .hint {
            margin-top: 16px;
            font-size: 0.85rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4
            }

            50% {
                opacity: 1
            }
        }

        /* Conv view */
        .conv-view {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .conv-header {
            max-width: 900px;
            margin: 0 auto 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .conv-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .conv-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .messages {
            max-width: 900px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        /* Message */
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message.system {
            align-items: center;
        }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .role-label {
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text);
        }

        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .msg-body {
            padding: 12px 16px;
            border-radius: 10px;
            line-height: 1.5;
            font-size: 0.9rem;
            word-break: break-word;
            overflow: hidden;
            min-width: 0;
        }

        .message.user .msg-body {
            background: var(--user-bg);
            border: 1px solid #d5d8ff;
            max-width: 80%;
            border-radius: 18px 18px 4px 18px;
        }

        .message.assistant .msg-body {
            background: var(--assistant-bg);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
        }

        .message.system .msg-body {
            background: var(--system-bg);
            border: 1px solid #f0e4c8;
            font-style: italic;
            font-size: 0.85rem;
            color: var(--text-muted);
            max-width: 90%;
            text-align: center;
        }

        /* Parts */
        .part-text p {
            margin: 0 0 1px 0;
        }

        .part-text p:last-child {
            margin-bottom: 0;
        }

        .part-text p:empty {
            display: none;
        }

        .md-li {
            padding: 0;
            margin: 0;
        }

        .part-text h2,
        .part-text h3,
        .part-text h4,
        .part-text h5,
        .part-text h6 {
            margin: 10px 0 4px;
            font-size: 0.95rem;
        }

        .part-text h5,
        .part-text h6 {
            font-size: 0.88rem;
        }

        .part-text hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        .part-text blockquote {
            border-left: 3px solid var(--accent);
            padding: 4px 12px;
            margin: 6px 0;
            color: var(--text-muted);
            background: #f5f5fa;
            border-radius: 0 4px 4px 0;
        }

        .part-text del {
            color: var(--text-muted);
        }

        .md-table-wrap {
            overflow-x: auto;
            margin: 8px 0;
        }

        .md-table-wrap table {
            border-collapse: collapse;
            font-size: 0.85rem;
            width: 100%;
        }

        .md-table-wrap th,
        .md-table-wrap td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
        }

        .md-table-wrap th {
            background: var(--bg);
            font-weight: 600;
        }

        .part-text code {
            background: var(--code-bg);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.85em;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            color: #d63384;
        }

        .part-text pre {
            background: #1e1e2e;
            color: #cdd6f4;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
            max-width: 100%;
        }

        .part-text pre code {
            background: none;
            padding: 0;
            font-size: 0.82rem;
            line-height: 1.5;
            color: inherit;
        }

        .part-text a {
            color: var(--accent);
            text-decoration: none;
        }

        .part-text a:hover {
            text-decoration: underline;
        }

        .part-image img {
            max-width: 360px;
            max-height: 360px;
            border-radius: 6px;
            margin: 6px 0;
        }

        .part-file,
        .file-ref {
            color: var(--text-muted);
            font-size: 0.82rem;
            padding: 4px 0;
        }

        /* Citations */
        .citations {
            margin: 6px 0;
            border: 1px solid #d1fae5;
            border-radius: 6px;
            overflow: hidden;
            background: #f0fdf4;
        }

        .citations summary {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #059669;
            user-select: none;
        }

        .citations summary:hover {
            background: #ecfdf5;
        }

        .citations-list {
            padding: 4px 12px 8px;
        }

        .citations-list .annotation {
            padding: 3px 0;
            font-size: 0.8rem;
            border-bottom: 1px solid #e5e7eb;
        }

        .citations-list .annotation:last-child {
            border-bottom: none;
        }

        .citations-list .annotation a {
            color: var(--accent);
            text-decoration: none;
        }

        .citations-list .annotation a:hover {
            text-decoration: underline;
        }

        /* Reasoning */
        .reasoning {
            margin: 6px 0;
            border: 1px solid #e0dff8;
            border-radius: 6px;
            overflow: hidden;
            background: #fafaff;
        }

        .reasoning summary {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--accent);
            user-select: none;
        }

        .reasoning summary:hover {
            background: #f0f0ff;
        }

        .reasoning-content {
            padding: 8px 12px;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid #e0dff8;
        }

        /* Tool */
        .tool-call {
            margin: 6px 0;
            border: 1px solid #dbeafe;
            border-radius: 6px;
            overflow: hidden;
            background: #f8faff;
        }

        .tool-call summary {
            padding: 7px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #3b82f6;
            user-select: none;
        }

        .tool-call summary:hover {
            background: #eff6ff;
        }

        .tool-body {
            padding: 8px 12px;
        }

        .tool-input {
            background: var(--code-bg);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.78rem;
            overflow-x: auto;
            margin-bottom: 6px;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .tool-output {
            border-top: 1px solid #dbeafe;
            padding-top: 6px;
            font-size: 0.82rem;
        }

        .translation {
            margin-top: 8px;
            padding: 8px 10px;
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #92400e;
        }

        .annotation {
            margin-top: 4px;
            font-size: 0.8rem;
        }

        .annotation a {
            color: var(--accent);
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                z-index: 50;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-btn {
                display: block;
            }

            .conv-view {
                padding: 12px;
                padding-top: 44px;
            }

            .message.user .msg-body {
                max-width: 90%;
            }
        }
    </style>
</head>

<body>

    <!-- Upload Screen -->
    <div class="upload-screen" id="uploadScreen">
        <div class="upload-inner">
            <h1>💬 AI 对话本地浏览器</h1>
            <p style="line-height:1.6; text-align:left; display:inline-block;">支持下列工具导出文件的离线解析与浏览：<br>
                📦 <code style="background:var(--code-bg);padding:1px 4px;border-radius:3px">.zip</code> <b>RikkaHub</b>
                备份文件<br>
                📑 <code style="background:var(--code-bg);padding:1px 4px;border-radius:3px">.json</code> <b>Chatbox</b>
                / <b>Open-WebUI</b> 会话<br>
                📝 <code style="background:var(--code-bg);padding:1px 4px;border-radius:3px">.md</code> <b>Gemini
                    Voyager</b> 记录（支持多文件）
            </p>
            <div class="upload-area" id="uploadArea">
                <div class="icon">📦</div>
                <div class="label">点击选择或拖拽文件到此处<br><span style="font-size:0.78rem;opacity:0.7">支持 .zip、.md 或
                        .json</span></div>
                <!-- multiple 允许同时选取多个文件 -->
                <input type="file" id="fileInput" accept=".zip,.md,.json" multiple>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusText"></div>
        </div>
    </div>

    <!-- App Container (hidden until file loaded) -->
    <div class="app-container" id="appContainer">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <!-- 标题会根据加载的数据来源动态更新 -->
                <h2 id="sidebarTitle">🗂️ 对话列表</h2>
                <span class="conv-count" id="convCount"></span>
            </div>
            <div class="search-wrap">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索对话..."
                    oninput="filterConversations()">
                <div class="search-mode-toggle">
                    <button class="search-mode-btn active" data-mode="title"
                        onclick="setSearchMode('title')">标题搜索</button>
                    <button class="search-mode-btn" data-mode="content" onclick="setSearchMode('content')">全文搜索</button>
                </div>
            </div>
            <div class="conv-list" id="convList"></div>
        </div>
        <div class="main" id="main">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <div class="welcome" id="welcome">
                <div class="welcome-inner">
                    <h1>💬 AI 对话本地浏览器</h1>
                    <p id="welcomeInfo"></p>
                    <p class="hint">← 从左侧选择一个对话开始浏览</p>
                </div>
            </div>
            <div class="conv-view" id="convView"></div>
        </div>
    </div>

    <script>
        // ─── Globals ───
        let conversations = [];
        let assistants = {};
        let currentConv = -1;

        // ─── Upload Handling ───
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        // 拖拽支持多文件
        uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });
        // 文件选择框支持多文件
        fileInput.addEventListener('change', e => { if (e.target.files.length) handleFiles(e.target.files); });

        function setStatus(msg, pct) {
            statusText.style.display = 'block';
            statusText.textContent = msg;
            if (pct !== undefined) {
                progressBar.style.display = 'block';
                progressFill.style.width = pct + '%';
            }
        }

        // ─── 文件分发入口：根据扩展名路由到不同解析器 ───
        /**
         * 统一文件入口。
         * - 若包含 .zip：走 RikkaHub 解析流程（只取第一个 zip）
         * - 若只有 .md：走 Gemini Voyager 解析流程（支持多文件）
         */
        async function handleFiles(fileList) {
            const files = Array.from(fileList);
            const zipFile = files.find(f => f.name.toLowerCase().endsWith('.zip'));
            const mdFiles = files.filter(f => f.name.toLowerCase().endsWith('.md'));
            const jsonFiles = files.filter(f => f.name.toLowerCase().endsWith('.json'));

            if (zipFile) {
                // RikkaHub 备份：优先处理 zip，忽略同批次 .md/.json
                await processZipFile(zipFile);
            } else if (jsonFiles.length > 0) {
                // Open-WebUI 或 Chatbox 导出：JSON 文件（可多文件合并）
                await processJsonFiles(jsonFiles);
            } else if (mdFiles.length > 0) {
                // Gemini Voyager 导出：可多文件
                await processMarkdownFiles(mdFiles);
            }
        }

        // 保留旧名字作为单文件兼容入口（内部调用 handleFiles）
        async function processFile(file) {
            await handleFiles([file]);
        }

        // ─── RikkaHub ZIP 解析（原 processFile 逻辑）───
        async function processZipFile(file) {
            try {
                setStatus('正在读取 zip 文件...', 10);
                const arrayBuffer = await file.arrayBuffer();

                setStatus('正在解压...', 30);
                const zip = await JSZip.loadAsync(arrayBuffer);

                // Find settings.json
                let settings = null;
                const settingsFile = zip.file('settings.json');
                if (settingsFile) {
                    setStatus('正在读取设置...', 40);
                    const settingsText = await settingsFile.async('string');
                    settings = JSON.parse(settingsText);
                }

                // Extract assistants
                if (settings && settings.assistants) {
                    for (const a of settings.assistants) {
                        assistants[a.id || ''] = a.name || '默认助手';
                    }
                }

                // Find database
                const dbFile = zip.file('rikka_hub.db');
                if (!dbFile) {
                    setStatus('❌ 未找到 rikka_hub.db');
                    return;
                }

                setStatus('正在加载数据库引擎...', 50);
                const SQL = await initSqlJs({
                    locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`
                });

                setStatus('正在读取数据库...', 60);
                const dbData = await dbFile.async('uint8array');
                const db = new SQL.Database(dbData);

                setStatus('正在解析对话...', 70);
                conversations = readConversations(db);

                setStatus('正在读取记忆...', 85);
                const memories = readMemories(db);
                db.close();

                setStatus('完成！', 100);

                // Show app
                setTimeout(() => {
                    document.getElementById('uploadScreen').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'flex';
                    renderSidebar(memories);
                }, 300);

            } catch (e) {
                setStatus('❌ 解析失败: ' + e.message);
                console.error(e);
            }
        }

        // ─── JSON 解析 (Open-WebUI / Chatbox) ───

        /**
         * 读取一批 JSON 文件，检测格式并合并所有对话后渲染。
         */
        async function processJsonFiles(files) {
            try {
                conversations = [];
                assistants = {};
                let total = 0;
                for (let i = 0; i < files.length; i++) {
                    setStatus(`正在读取 ${files[i].name}...`, Math.round(10 + 70 * i / files.length));
                    const text = await files[i].text();
                    try {
                        const data = JSON.parse(text);
                        let parsed = [];
                        if (data.__exported_items || data['chat-sessions-list']) {
                            parsed = parseChatboxExport(data);
                        } else if (Array.isArray(data)) {
                            parsed = parseOpenWebUIExport(data);
                        } else {
                            console.warn('未知 JSON 格式，跳过:', files[i].name);
                        }
                        conversations.push(...parsed);
                        total += parsed.length;
                    } catch (e) {
                        console.error('JSON解析失败:', files[i].name, e);
                    }
                }
                // 按更新时间降序排列
                conversations.sort((a, b) => (b.update_ts || 0) - (a.update_ts || 0));

                setStatus('完成！', 100);
                setTimeout(() => {
                    document.getElementById('uploadScreen').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'flex';
                    renderSidebar([]);
                }, 300);
            } catch (e) {
                setStatus('❌ 解析失败: ' + e.message);
                console.error(e);
            }
        }

        /**
         * 解析 Chatbox 导出 JSON
         */
        function parseChatboxExport(data) {
            const list = data['chat-sessions-list'] || [];
            const result = [];
            for (const meta of list) {
                const sid = meta.id;
                if (!sid) continue;
                const sdata = data[`session:\${sid}`] || data[`session:${sid}`];
                if (!sdata) continue;

                const title = sdata.name || '(无标题)';
                const is_pinned = meta.starred || false;
                const msgsData = sdata.messages || [];

                let minTs = -1, maxTs = -1;
                const messages = [];

                for (const m of msgsData) {
                    const role = m.role || 'unknown';
                    const ts = m.timestamp || 0;
                    if (minTs === -1 || ts < minTs) minTs = ts;
                    if (ts > maxTs) maxTs = ts;

                    const parts = [];
                    for (const p of (m.contentParts || [])) {
                        const pt = p.type || '';
                        if (pt === 'text') parts.push({ type: 'text', text: p.text || '' });
                        else if (pt === 'reasoning') parts.push({ type: 'reasoning', text: p.text || '' });
                        else if (pt === 'image') parts.push({ type: 'image', url: p.storageKey || '' });
                        else parts.push({ type: pt, text: p.text || '' });
                    }

                    let usage = null;
                    if (m.usage) {
                        usage = {
                            prompt_tokens: m.usage.inputTokens || 0,
                            completion_tokens: m.usage.outputTokens || 0,
                            total_tokens: m.usage.totalTokens || 0
                        };
                    }

                    messages.push({
                        role,
                        parts,
                        usage,
                        created_at: epochMsToStr(ts),
                        model: m.model || '',
                        branch_count: 1,
                        branch_index: 0
                    });
                }

                result.push({
                    id: sid,
                    title,
                    create_at: minTs !== -1 ? epochMsToStr(minTs) : '',
                    update_at: maxTs !== -1 ? epochMsToStr(maxTs) : '',
                    update_ts: maxTs,
                    is_pinned,
                    source_type: 'chatbox',
                    assistant_id: null,
                    models: [],
                    messages
                });
            }
            return result;
        }

        /**
         * 解析 Open-WebUI 导出 JSON（数组格式），返回统一的对话数组。
         *
         * 导出格式摘要：
         *   [{
         *     id, title, pinned, created_at, updated_at,
         *     chat: {
         *       title, models,
         *       history: {
         *         currentId: "<末尾消息 ID>",
         *         messages: { "<id>": { id, parentId, childrenIds, role, content, timestamp, model, usage } }
         *       }
         *     }
         *   }, ...]
         *
         * 消息树通过 parentId 链接；沿 currentId→parentId 回溯即当前分支。
         * 助手消息内容可能包含 <details type="reasoning"> 推理块，需拆分为 reasoning part。
         */
        function parseOpenWebUIExport(data) {
            return data.map(item => {
                try { return parseOpenWebUIConversation(item); }
                catch (e) { console.warn('跳过无效对话:', item?.id, e.message); return null; }
            }).filter(Boolean);
        }

        /**
         * 解析单条 Open-WebUI 对话。
         * 从 currentId 沿 parentId 回溯重建当前分支的消息列表。
         */
        function parseOpenWebUIConversation(item) {
            const chat = item.chat || {};
            const history = chat.history || {};
            const msgMap = history.messages || {};
            const currentId = history.currentId;

            // 沿 parentId 回溯至根节点，再反转即正序
            const chain = [];
            let mid = currentId;
            const visited = new Set();
            while (mid && !visited.has(mid)) {
                visited.add(mid);
                const m = msgMap[mid];
                if (!m) break;
                chain.push(m);
                mid = m.parentId || null;
            }
            chain.reverse();

            // Open-WebUI 使用秒级时间戳
            const createdTs = (item.created_at || chat.timestamp || 0) * 1000;
            const updatedTs = (item.updated_at || item.created_at || 0) * 1000;

            return {
                id: item.id || '',
                title: item.title || chat.title || '(无标题)',
                create_at: epochMsToStr(createdTs),
                update_at: epochMsToStr(updatedTs),
                update_ts: updatedTs,   // 用于排序
                is_pinned: !!item.pinned,
                source_type: 'openwebui',
                assistant_id: null,
                // 保留模型名用于徽章显示
                models: chat.models || [],
                messages: chain.map(parseOpenWebUIMessage),
            };
        }

        /**
         * 解析单条 Open-WebUI 消息。
         * 将正文中的 <details type="reasoning"> 块提取为独立的 reasoning part，
         * 其余内容作为 text part，保持与 RikkaHub 消息结构一致。
         */
        function parseOpenWebUIMessage(m) {
            const role = m.role || 'user';
            let content = m.content || '';
            const parts = [];
            const reasoningTexts = [];

            // 提取 <details type="reasoning"> 推理块（支持 done/duration 等属性）
            content = content.replace(/<details[^>]*type="reasoning"[^>]*>([\s\S]*?)<\/details>/gi, (_, inner) => {
                // 去掉 <summary>...</summary> 行，剩余为推理正文
                const body = inner.replace(/<summary>[\s\S]*?<\/summary>\s*/i, '').trim();
                if (body) reasoningTexts.push(body);
                return '';
            }).trim();

            if (content) parts.push({ type: 'text', text: content });
            if (reasoningTexts.length) parts.push({ type: 'reasoning', text: reasoningTexts.join('\n\n') });

            let usage = null;
            if (m.usage) {
                const u = m.usage;
                usage = {
                    prompt_tokens: u.prompt_tokens || 0,
                    completion_tokens: u.completion_tokens || 0,
                    total_tokens: u.total_tokens || (u.prompt_tokens || 0) + (u.completion_tokens || 0),
                };
            }

            // timestamp 为秒级
            const ts = m.timestamp ? epochMsToStr(m.timestamp * 1000) : '';
            return {
                role,
                created_at: ts,
                parts,
                usage,
                annotations: [],
                branch_count: 1,
                branch_index: 0,
                model: m.model || m.modelName || '',
            };
        }

        // ─── Gemini Voyager Markdown 解析 ───

        /**
         * 解析单个 Gemini Voyager 导出的 .md 文件，返回对话对象。
         *
         * 文件格式：
         *   # 对话标题
         *   **Date**: 日期字符串
         *   **Turns**: N
         *   **Source**: [文本](URL)
         *   ---
         *   ## Turn 1
         *   ### 👤 User
         *   用户内容（可含 Markdown）
         *   ### 🤖 Assistant
         *   助手内容（可含 ##/### 标题等 Markdown）
         *   ## Turn 2
         *   ...
         *
         * @param {string} text     文件全文
         * @param {string} fileName 文件名（标题备用）
         * @returns {object} 与 RikkaHub 对话结构兼容的对象
         */
        function parseGeminiMarkdownFile(text, fileName) {
            // ── 提取标题（第一个 H1 行）──
            const titleMatch = text.match(/^#\s+(.+)$/m);
            const title = titleMatch ? titleMatch[1].trim() : fileName.replace(/\.md$/i, '');

            // ── 提取日期字段 ──
            const dateMatch = text.match(/\*\*Date\*\*:\s*(.+)/);
            const dateStr = dateMatch ? dateMatch[1].trim() : '';

            // ── 提取来源 URL（**Source**: [文本](URL) 格式）──
            const sourceMatch = text.match(/\*\*Source\*\*:\s*\[.*?\]\(([^)]+)\)/);
            const sourceUrl = sourceMatch ? sourceMatch[1] : '';

            // ── 定位正文（元信息 --- 分隔符之后）──
            const sepIdx = text.indexOf('\n---\n');
            const bodyText = sepIdx >= 0 ? text.slice(sepIdx + 5) : text;

            // ── 找到所有 ## Turn N 段落的起始位置 ──
            // 注意：助手回复内可能包含 ## 标题，但 "## Turn N" 只在顶层出现
            const turnPattern = /^## Turn \d+/gm;
            let m;
            const turnStarts = [];
            while ((m = turnPattern.exec(bodyText)) !== null) {
                turnStarts.push(m.index);
            }

            const messages = [];
            // 两个角色标记字符串（包含前后换行，精确匹配）
            const USER_MARKER = '\n### 👤 User\n';
            const ASST_MARKER = '\n### 🤖 Assistant\n';

            for (let i = 0; i < turnStarts.length; i++) {
                const secStart = turnStarts[i];
                const secEnd = i + 1 < turnStarts.length ? turnStarts[i + 1] : bodyText.length;
                const section = bodyText.slice(secStart, secEnd);

                const userIdx = section.indexOf(USER_MARKER);
                const asstIdx = section.indexOf(ASST_MARKER);

                // ── 用户消息：USER_MARKER 到 ASST_MARKER（或段末）之间的内容 ──
                if (userIdx !== -1) {
                    const contentEnd = asstIdx !== -1 ? asstIdx : section.length;
                    const userContent = section.slice(userIdx + USER_MARKER.length, contentEnd).trim();
                    if (userContent) {
                        messages.push({
                            role: 'user',
                            parts: [{ type: 'text', text: userContent }],
                            annotations: [], usage: null, created_at: '',
                            model_id: null, translation: null,
                            branch_count: 1, branch_index: 0
                        });
                    }
                }

                // ── 助手消息：ASST_MARKER 之后直到段末 ──
                if (asstIdx !== -1) {
                    const asstContent = section.slice(asstIdx + ASST_MARKER.length).trim();
                    if (asstContent) {
                        messages.push({
                            role: 'assistant',
                            parts: [{ type: 'text', text: asstContent }],
                            annotations: [], usage: null, created_at: '',
                            model_id: null, translation: null,
                            branch_count: 1, branch_index: 0
                        });
                    }
                }
            }

            return {
                // 用随机 id 避免与 RikkaHub 数字 id 冲突
                id: 'gemini-' + Date.now() + '-' + Math.random().toString(36).slice(2),
                title,
                create_at: dateStr,
                update_at: dateStr,
                is_pinned: false,
                assistant_id: null,
                source_type: 'gemini',  // 标识来源，用于侧栏显示徽章
                source_url: sourceUrl,  // 原始 Gemini 对话链接
                messages
            };
        }

        /**
         * 处理一批 Gemini Voyager .md 文件，解析后填充 conversations 并切换到主视图。
         * @param {File[]} mdFiles 用户选择的 .md 文件数组
         */
        async function processMarkdownFiles(mdFiles) {
            setStatus(`正在解析 ${mdFiles.length} 个 Markdown 文件...`, 20);

            const parsed = [];
            for (let i = 0; i < mdFiles.length; i++) {
                const file = mdFiles[i];
                setStatus(`正在解析: ${file.name}`, Math.round(20 + (i / mdFiles.length) * 70));
                try {
                    const text = await file.text();
                    const conv = parseGeminiMarkdownFile(text, file.name);
                    parsed.push(conv);
                } catch (e) {
                    console.warn('解析失败:', file.name, e);
                }
            }

            // 对话按日期字符串降序排列（最新在前）
            parsed.sort((a, b) => b.create_at.localeCompare(a.create_at));

            conversations = parsed;
            assistants = {};

            setStatus('完成！', 100);
            setTimeout(() => {
                document.getElementById('uploadScreen').style.display = 'none';
                document.getElementById('appContainer').style.display = 'flex';
                renderSidebar([]);
            }, 300);
        }

        // ─── Database Reading ───
        function readConversations(db) {
            const convs = [];
            const rows = db.exec(
                "SELECT id, assistant_id, title, create_at, update_at, is_pinned " +
                "FROM ConversationEntity ORDER BY update_at DESC"
            );
            if (!rows.length) return convs;

            for (const row of rows[0].values) {
                const [id, assistant_id, title, create_at, update_at, is_pinned] = row;
                const conv = {
                    id, assistant_id,
                    title: title || '(无标题)',
                    create_at: epochMsToStr(create_at),
                    update_at: epochMsToStr(update_at),
                    is_pinned: !!is_pinned,
                    messages: []
                };

                const nodeRows = db.exec(
                    "SELECT messages, select_index FROM message_node " +
                    "WHERE conversation_id = ? ORDER BY node_index ASC",
                    [id]
                );
                if (nodeRows.length) {
                    for (const nrow of nodeRows[0].values) {
                        const [messagesJson, selectIndex] = nrow;
                        try {
                            const messages = JSON.parse(messagesJson);
                            if (!messages || !messages.length) continue;
                            const idx = (selectIndex >= 0 && selectIndex < messages.length) ? selectIndex : 0;
                            const parsed = parseUIMessage(messages[idx]);
                            parsed.branch_count = messages.length;
                            parsed.branch_index = idx;
                            conv.messages.push(parsed);
                        } catch (e) { }
                    }
                }
                convs.push(conv);
            }
            return convs;
        }

        function readMemories(db) {
            try {
                const rows = db.exec("SELECT id, assistant_id, content FROM MemoryEntity");
                if (!rows.length) return [];
                return rows[0].values.map(r => ({ id: r[0], assistant_id: r[1], content: r[2] }));
            } catch (e) { return []; }
        }

        function parseUIMessage(msg) {
            const parts = [];
            for (const p of (msg.parts || [])) {
                const parsed = parseMessagePart(p);
                if (parsed) parts.push(parsed);
            }

            const annotations = [];
            for (const ann of (msg.annotations || [])) {
                if (ann.type === 'url_citation') {
                    annotations.push({ type: 'url_citation', title: ann.title || '', url: ann.url || '' });
                }
            }

            let usage = null;
            if (msg.usage) {
                usage = {
                    prompt_tokens: msg.usage.promptTokens || msg.usage.prompt_tokens || 0,
                    completion_tokens: msg.usage.completionTokens || msg.usage.completion_tokens || 0,
                    total_tokens: msg.usage.totalTokens || msg.usage.total_tokens || 0
                };
            }

            return {
                role: msg.role || 'unknown',
                parts, annotations, usage,
                created_at: msg.createdAt || '',
                model_id: msg.modelId || null,
                translation: msg.translation || null
            };
        }

        function parseMessagePart(part) {
            const t = part.type || '';

            if (t === 'me.rerere.ai.ui.UIMessagePart.Text' || ('text' in part && !('reasoning' in part) && !('toolCallId' in part) && !('toolName' in part) && !('url' in part) && !('fileName' in part))) {
                return { type: 'text', text: part.text || '' };
            }
            if (t === 'me.rerere.ai.ui.UIMessagePart.Reasoning' || 'reasoning' in part) {
                return { type: 'reasoning', text: part.reasoning || '' };
            }
            if (t === 'me.rerere.ai.ui.UIMessagePart.Image' || ('url' in part && !('fileName' in part) && !('toolCallId' in part) && !('reasoning' in part))) {
                if ('toolCallId' in part || 'toolName' in part || 'reasoning' in part) return null;
                return { type: 'image', url: part.url || '' };
            }
            if (t === 'me.rerere.ai.ui.UIMessagePart.Document' || 'fileName' in part) {
                return { type: 'document', url: part.url || '', file_name: part.fileName || '', mime: part.mime || '' };
            }
            if (t === 'me.rerere.ai.ui.UIMessagePart.Video') return { type: 'video', url: part.url || '' };
            if (t === 'me.rerere.ai.ui.UIMessagePart.Audio') return { type: 'audio', url: part.url || '' };
            if (t === 'me.rerere.ai.ui.UIMessagePart.Tool' || 'toolCallId' in part) {
                const outputParts = [];
                for (const op of (part.output || [])) {
                    const parsed = parseMessagePart(op);
                    if (parsed) outputParts.push(parsed);
                }
                return { type: 'tool', tool_call_id: part.toolCallId || '', tool_name: part.toolName || '', input: part.input || '', output: outputParts };
            }
            if ('text' in part && typeof part.text === 'string') return { type: 'text', text: part.text };
            return null;
        }

        function epochMsToStr(ms) {
            if (!ms) return '';
            try {
                const d = new Date(ms);
                return d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0') + ' ' +
                    String(d.getHours()).padStart(2, '0') + ':' +
                    String(d.getMinutes()).padStart(2, '0') + ':' +
                    String(d.getSeconds()).padStart(2, '0');
            } catch (e) { return String(ms); }
        }

        // ─── Markdown Renderer ───

        /**
         * 渲染 KaTeX 公式，失败时退回原始文本（避免整页崩溃）。
         * @param {string} src   LaTeX 源码（不含 $ 符号）
         * @param {boolean} block 是否为块级公式
         */
        function renderMath(src, block) {
            try {
                return katex.renderToString(src, { displayMode: block, throwOnError: false });
            } catch (e) {
                return block ? `<pre>$$${src}$$</pre>` : `<code>$${src}$</code>`;
            }
        }

        /**
         * 在进入 Markdown 解析管道之前，把数学公式提取为占位符，
         * 避免 $ 符号被误当成普通文本或被 inlineFormat 破坏。
         * 支持：
         *   $$...$$  （块级，单行或多行）
         *   $...$    （行内，不跨行）
         */
        function extractMath(text) {
            const slots = [];   // 保存原始 LaTeX 源码和类型

            // 先处理块级 $$...$$（优先级高于行内）
            text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, src) => {
                slots.push({ src, block: true });
                return `\x00M${slots.length - 1}\x00`;
            });

            // 再处理行内 $...$（不允许跨行，也不允许内容为空）
            text = text.replace(/\$([^\n$]+?)\$/g, (_, src) => {
                slots.push({ src, block: false });
                return `\x00M${slots.length - 1}\x00`;
            });

            return { text, slots };
        }

        /** 把占位符替换回 KaTeX 渲染结果 */
        function restoreMath(html, slots) {
            return html.replace(/\x00M(\d+)\x00/g, (_, i) => {
                const { src, block } = slots[+i];
                return renderMath(src, block);
            });
        }
        function esc(s) {
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function inlineFormat(text) {
            // Protect code spans
            const codeSpans = [];
            text = text.replace(/`([^`]+)`/g, (_, c) => { codeSpans.push(c); return '\x00C' + (codeSpans.length - 1) + '\x00'; });
            // Images
            text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:360px;border-radius:6px">');
            // Links
            text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            // Bold-italic
            text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            // Bold
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
            // Strikethrough
            text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');
            // Italic (single * not adjacent to **)
            text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
            // Restore code
            for (let i = 0; i < codeSpans.length; i++) {
                text = text.replace('\x00C' + i + '\x00', '<code>' + codeSpans[i] + '</code>');
            }
            return text;
        }

        function simpleMarkdown(text) {
            // 在进入行解析前，先把数学公式替换为占位符，防止 $ 被误处理
            const { text: safeText, slots } = extractMath(text);
            const lines = safeText.split('\n');
            const result = [];
            let inCode = false, codeLang = '', codeLines = [];
            let inTable = false, tableRows = [];

            function flushTable() {
                if (!tableRows.length) return;
                let html = '<div class="md-table-wrap"><table>';
                for (let ri = 0; ri < tableRows.length; ri++) {
                    let cells = tableRows[ri].split('|').map(c => c.trim());
                    if (cells[0] === '') cells.shift();
                    if (cells[cells.length - 1] === '') cells.pop();
                    if (cells.every(c => c.replace(/[-:]/g, '') === '')) continue;
                    const tag = ri === 0 ? 'th' : 'td';
                    html += '<tr>' + cells.map(c => `<${tag}>${inlineFormat(esc(c))}</${tag}>`).join('') + '</tr>';
                }
                html += '</table></div>';
                result.push(html);
                tableRows = [];
                inTable = false;
            }

            for (const line of lines) {
                const stripped = line.trim();

                if (stripped.startsWith('```')) {
                    if (inTable) flushTable();
                    if (inCode) {
                        result.push(`<pre><code class="lang-${esc(codeLang)}">${esc(codeLines.join('\n'))}</code></pre>`);
                        codeLines = [];
                        inCode = false;
                    } else {
                        codeLang = stripped.slice(3).trim();
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) { codeLines.push(line); continue; }

                // Table
                if (stripped.includes('|') && stripped.startsWith('|')) {
                    if (!inTable) { inTable = true; tableRows = []; }
                    tableRows.push(stripped);
                    continue;
                } else if (inTable) { flushTable(); }

                // Horizontal rule
                if (/^(\s*[-*_]\s*){3,}$/.test(stripped)) { result.push('<hr>'); continue; }

                // Heading
                const hm = line.match(/^(#{1,6})\s+(.+)$/);
                if (hm) {
                    const lvl = Math.min(hm[1].length + 1, 6);
                    result.push(`<h${lvl}>${inlineFormat(esc(hm[2]))}</h${lvl}>`);
                    continue;
                }

                // Empty line - skip
                if (!stripped) continue;

                // Blockquote
                if (stripped.startsWith('> ')) {
                    result.push(`<blockquote>${inlineFormat(esc(stripped.slice(2)))}</blockquote>`);
                    continue;
                }
                if (stripped === '>') { result.push('<blockquote></blockquote>'); continue; }

                const escaped = esc(line);
                const formatted = inlineFormat(escaped);

                // Unordered list
                const ulm = line.match(/^(\s*)([-*+])\s+(.+)$/);
                if (ulm) {
                    const margin = ulm[1].length * 12;
                    result.push(`<div class="md-li" style="margin-left:${margin}px">• ${inlineFormat(esc(ulm[3]))}</div>`);
                    continue;
                }

                // Ordered list
                const olm = line.match(/^(\s*)(\d+)[.)]\s+(.+)$/);
                if (olm) {
                    const margin = olm[1].length * 12;
                    result.push(`<div class="md-li" style="margin-left:${margin}px">${olm[2]}. ${inlineFormat(esc(olm[3]))}</div>`);
                    continue;
                }

                result.push(`<p>${formatted}</p>`);
            }

            if (inCode && codeLines.length) result.push(`<pre><code>${esc(codeLines.join('\n'))}</code></pre>`);
            if (inTable) flushTable();
            // 最后把数学公式占位符还原为 KaTeX 渲染的 HTML
            return restoreMath(result.join('\n'), slots);
        }

        // ─── Rendering ───
        function renderPart(part) {
            const t = part.type;
            if (t === 'text') {
                const text = part.text || '';
                if (!text.trim()) return '';
                return `<div class="part-text">${simpleMarkdown(text)}</div>`;
            }
            if (t === 'reasoning') {
                const text = part.text || '';
                if (!text.trim()) return '';
                return `<details class="reasoning"><summary>💭 思考过程</summary><div class="reasoning-content">${simpleMarkdown(text)}</div></details>`;
            }
            if (t === 'image') {
                const url = part.url || '';
                if (url.startsWith('data:')) return `<div class="part-image"><img src="${url}" alt="image" loading="lazy"></div>`;
                return `<div class="part-image"><span class="file-ref">🖼️ 图片: ${esc(url)}</span></div>`;
            }
            if (t === 'document') return `<div class="part-file">📄 ${esc(part.file_name || '文档')} <span style="color:var(--text-muted)">${esc(part.mime || '')}</span></div>`;
            if (t === 'video') return `<div class="part-file">🎬 视频: ${esc(part.url || '')}</div>`;
            if (t === 'audio') return `<div class="part-file">🔊 音频: ${esc(part.url || '')}</div>`;
            if (t === 'tool') {
                const friendlyNames = { memory_tool: '🧠 记忆操作', search_web: '🔍 网页搜索', scrape_web: '🌐 网页抓取' };
                const name = friendlyNames[part.tool_name] || `🔧 ${part.tool_name}`;
                let inputDisplay = part.input || '';
                try { inputDisplay = JSON.stringify(JSON.parse(inputDisplay), null, 2); } catch (e) { }
                let outputHtml = '';
                if (part.output && part.output.length) {
                    outputHtml = `<div class="tool-output"><strong>输出:</strong>${part.output.map(renderPart).join('')}</div>`;
                }
                return `<details class="tool-call"><summary>${name}</summary><div class="tool-body"><pre class="tool-input">${esc(inputDisplay)}</pre>${outputHtml}</div></details>`;
            }
            return '';
        }

        function renderSidebar(memories) {
            document.getElementById('convCount').textContent = `${conversations.length} 条对话`;
            document.getElementById('welcomeInfo').textContent = `共 ${conversations.length} 条对话记录` + (memories.length ? ` · 🧠 ${memories.length} 条 AI 记忆` : '');

            // ── 根据来源组成动态设置侧边栏标题 ──
            const geminiCount = conversations.filter(c => c.source_type === 'gemini').length;
            const owuiCount = conversations.filter(c => c.source_type === 'openwebui').length;
            const chatboxCount = conversations.filter(c => c.source_type === 'chatbox').length;
            const rikkaCount = conversations.length - geminiCount - owuiCount - chatboxCount;
            let sidebarTitle = '🗂️ RikkaHub 对话';
            if (owuiCount > 0 && geminiCount === 0 && rikkaCount === 0 && chatboxCount === 0) sidebarTitle = '🌐 Open-WebUI 对话';
            else if (geminiCount > 0 && rikkaCount === 0 && owuiCount === 0 && chatboxCount === 0) sidebarTitle = '✨ Gemini 对话';
            else if (chatboxCount > 0 && rikkaCount === 0 && owuiCount === 0 && geminiCount === 0) sidebarTitle = '📦 Chatbox 对话';
            else if (geminiCount > 0 || owuiCount > 0 || chatboxCount > 0) sidebarTitle = '📚 对话列表';
            document.getElementById('sidebarTitle').textContent = sidebarTitle;

            const list = document.getElementById('convList');
            list.innerHTML = '';
            for (let i = 0; i < conversations.length; i++) {
                const conv = conversations[i];
                const pin = conv.is_pinned ? ' 📌' : '';

                // 来源徽章
                let badge = '';
                if (conv.source_type === 'openwebui') {
                    const modelLabel = (conv.models && conv.models[0]) ? conv.models[0].split('/').pop() : 'Open-WebUI';
                    badge = ` <span class="assistant-badge owui-badge">${esc(modelLabel)}</span>`;
                } else if (conv.source_type === 'gemini') {
                    badge = ` <span class="assistant-badge gemini-badge">Gemini</span>`;
                } else if (conv.source_type === 'chatbox') {
                    badge = ` <span class="assistant-badge chatbox-badge">Chatbox</span>`;
                } else {
                    const aName = assistants[conv.assistant_id] || '';
                    if (aName) badge = ` <span class="assistant-badge">${esc(aName)}</span>`;
                }

                const item = document.createElement('div');
                item.className = 'conv-item';
                item.dataset.index = i;
                item.dataset.title = conv.title;
                item.onclick = () => showConversation(i);
                item.innerHTML = `<div class="conv-title">${pin}${esc(conv.title)}${badge}</div><div class="conv-meta">${conv.update_at} · ${conv.messages.length} 条消息</div>`;
                list.appendChild(item);
            }
        }

        function showConversation(index) {
            const conv = conversations[index];
            if (!conv) return;
            currentConv = index;

            // Update sidebar
            document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', parseInt(el.dataset.index) === index));

            // Hide welcome, show conv view
            document.getElementById('welcome').style.display = 'none';
            const view = document.getElementById('convView');
            view.style.display = 'block';

            const roleLabels = { user: '👤 User', assistant: '🤖 Assistant', system: '⚙️ System' };
            const pin = conv.is_pinned ? '📌 ' : '';

            // ── 来源信息（Gemini 链接 / Open-WebUI / Chatbox 模型列表）──
            let sourceHtml = '';
            if (conv.source_type === 'gemini' && conv.source_url) {
                sourceHtml = ` · <a href="${esc(conv.source_url)}" target="_blank" style="color:var(--accent)">🔗 在 Gemini 中查看</a>`;
            } else if (conv.source_type === 'openwebui' && conv.models && conv.models.length) {
                sourceHtml = ` · 🌐 ${esc(conv.models.join(', '))}`;
            } else if (conv.source_type === 'chatbox') {
                sourceHtml = ` · 📦 Chatbox 数据`;
            }

            let html = `<div class="conv-header"><h2>${pin}${esc(conv.title)}</h2><div class="conv-info">日期: ${conv.create_at} · ${conv.messages.length} 条消息${sourceHtml}</div></div><div class="messages">`;

            for (const msg of conv.messages) {
                const role = (msg.role || '').toLowerCase();
                const label = roleLabels[role] || msg.role;
                const extras = [];
                if (msg.created_at) extras.push(String(msg.created_at));
                if ((msg.branch_count || 1) > 1) extras.push(`分支 ${msg.branch_index + 1}/${msg.branch_count}`);
                // Open-WebUI 助手消息显示具体模型名
                if (role === 'assistant' && msg.model) extras.push(esc(msg.model.split('/').pop()));
                if (msg.usage && msg.usage.total_tokens) extras.push(`${msg.usage.total_tokens} tokens`);

                html += `<div class="message ${role}"><div class="msg-header"><span class="role-label">${label}</span>`;
                if (extras.length) html += `<span class="msg-meta">${extras.join(' · ')}</span>`;
                html += `</div><div class="msg-body">`;
                for (const part of msg.parts.filter(p => p.type !== 'reasoning')) html += renderPart(part);
                for (const part of msg.parts.filter(p => p.type === 'reasoning')) html += renderPart(part);
                if (msg.translation) html += `<div class="translation"><strong>翻译:</strong> ${esc(msg.translation)}</div>`;
                const citations = (msg.annotations || []).filter(a => a.type === 'url_citation');
                if (citations.length) {
                    html += `<details class="citations"><summary>🔗 ${citations.length} 条引用</summary><div class="citations-list">`;
                    for (const ann of citations) html += `<div class="annotation"><a href="${esc(ann.url)}" target="_blank">${esc(ann.title || ann.url)}</a></div>`;
                    html += '</div></details>';
                }
                html += `</div></div>`;
            }
            html += '</div>';
            view.innerHTML = html;
            view.scrollTop = 0;

            // Close sidebar on mobile
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        }

        let searchMode = 'title';

        function setSearchMode(mode) {
            searchMode = mode;
            document.querySelectorAll('.search-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            filterConversations();
        }

        function filterConversations() {
            const q = document.getElementById('searchBox').value.toLowerCase().trim();
            if (!q) {
                // 清空时恢复所有项，移除预览
                document.querySelectorAll('.conv-item').forEach(el => {
                    el.style.display = '';
                    const preview = el.querySelector('.search-match-preview');
                    if (preview) preview.remove();
                });
                return;
            }

            document.querySelectorAll('.conv-item').forEach(el => {
                const idx = parseInt(el.dataset.index);
                const conv = conversations[idx];
                // 移除旧的预览
                const oldPreview = el.querySelector('.search-match-preview');
                if (oldPreview) oldPreview.remove();

                // 标题搜索
                const titleMatch = (el.dataset.title || '').toLowerCase().includes(q);

                if (searchMode === 'title') {
                    el.style.display = titleMatch ? '' : 'none';
                    return;
                }

                // 全文搜索：搜索所有消息内容
                let contentMatch = null;
                if (conv && conv.messages) {
                    for (const msg of conv.messages) {
                        for (const part of msg.parts) {
                            const text = part.text || part.reasoning || '';
                            const lowerText = text.toLowerCase();
                            const matchIdx = lowerText.indexOf(q);
                            if (matchIdx !== -1) {
                                // 提取上下文
                                const start = Math.max(0, matchIdx - 30);
                                const end = Math.min(text.length, matchIdx + q.length + 30);
                                let ctx = text.substring(start, end).replace(/\n/g, ' ');
                                if (start > 0) ctx = '...' + ctx;
                                if (end < text.length) ctx += '...';
                                const roleIcon = { user: '👤', assistant: '🤖', system: '⚙️' }[msg.role?.toLowerCase()] || '❓';
                                contentMatch = { ctx, roleIcon, matchIdx: matchIdx - start + (start > 0 ? 3 : 0) };
                                break;
                            }
                        }
                        if (contentMatch) break;
                    }
                }

                if (titleMatch || contentMatch) {
                    el.style.display = '';
                    // 显示匹配预览
                    if (contentMatch) {
                        const preview = document.createElement('div');
                        preview.className = 'search-match-preview';
                        // 高亮关键词
                        const raw = contentMatch.ctx;
                        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                        const highlighted = esc(raw).replace(re, '<mark>$1</mark>');
                        preview.innerHTML = `${contentMatch.roleIcon} ${highlighted}`;
                        el.appendChild(preview);
                    }
                } else {
                    el.style.display = 'none';
                }
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Keyboard nav
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT') return;
            const items = [...document.querySelectorAll('.conv-item:not([style*="display: none"])')];
            if (!items.length) return;
            let idx = items.findIndex(el => el.classList.contains('active'));
            if (e.key === 'ArrowDown' || e.key === 'j') {
                e.preventDefault();
                idx = Math.min(idx + 1, items.length - 1);
                showConversation(parseInt(items[idx].dataset.index));
                items[idx].scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp' || e.key === 'k') {
                e.preventDefault();
                idx = Math.max(idx - 1, 0);
                showConversation(parseInt(items[idx].dataset.index));
                items[idx].scrollIntoView({ block: 'nearest' });
            }
        });
    </script>
</body>
